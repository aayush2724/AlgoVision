<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoVision &middot; See the algorithm before the code</title>
  <meta name="description" content="AlgoVision reveals the real-world meaning of algorithms first — cinematic visuals, then the code." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css" />
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div id="loader" class="loader">
    <div class="loader-progress">
      <span id="loader-count" class="loader-count">000</span>
      <div class="loader-bar-bg"><div id="loader-bar" class="loader-bar"></div></div>
    </div>
    <div class="loader-brand">AlgoVision</div>
  </div>

  <div id="cursor" class="cursor"><div class="cursor-ring"></div></div>

  <header class="nav">
    <div class="brand">Algo<span>Vision</span></div>
    <nav id="nav-links"></nav>
    <button id="nav-toggle" class="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main id="app"></main>

  <footer class="footer">
    <div class="brand">Algo<span>Vision</span></div>
    <p>Built with FastAPI, Three.js and GSAP. Inspired by takeuforward's A2Z sheet (not affiliated).</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
